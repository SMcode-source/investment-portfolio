[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect /api/* calls to Netlify Functions
[[redirects]]
  from = "/api/ibkr-search"
  to = "/.netlify/functions/ibkr-search"
  status = 200

[[redirects]]
  from = "/api/ibkr-quote"
  to = "/.netlify/functions/ibkr-quote"
  status = 200

[[redirects]]
  from = "/api/ibkr-historical"
  to = "/.netlify/functions/ibkr-historical"
  status = 200

[[redirects]]
  from = "/api/ibkr-init"
  to = "/.netlify/functions/ibkr-init"
  status = 200
